services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asura}
      POSTGRES_DB: ${POSTGRES_DB:-asura}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./evidence:/data/evidence
      - ./reports:/data/reports
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    command: rq worker asura
    env_file: .env
    volumes:
      - ./evidence:/data/evidence
      - ./reports:/data/reports
    depends_on:
      - api
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:

