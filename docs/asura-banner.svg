<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Asura — self-hosted security command center">
  <title>Asura — self-hosted security command center</title>
  <defs>
    <radialGradient id="asuraPlate" cx="30%" cy="50%" r="80%">
      <stop offset="0%"   stop-color="#1a0a36"/>
      <stop offset="55%"  stop-color="#0d041e"/>
      <stop offset="100%" stop-color="#05010d"/>
    </radialGradient>

    <radialGradient id="asuraCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fffbeb" stop-opacity="0.92"/>
      <stop offset="22%"  stop-color="#fde68a" stop-opacity="0.78"/>
      <stop offset="48%"  stop-color="#d4af37" stop-opacity="0.55"/>
      <stop offset="78%"  stop-color="#6b21a8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3b1d6e" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="asuraAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="55%"  stop-color="#6b21a8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#15082c" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="asuraBackWash" cx="22%" cy="60%" r="55%">
      <stop offset="0%"   stop-color="#6b21a8" stop-opacity="0.28"/>
      <stop offset="60%"  stop-color="#3b1d6e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#05010d" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="asuraGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a16207"/>
      <stop offset="50%"  stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>

    <linearGradient id="asuraWord" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="50%"  stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>

    <filter id="asuraGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="asuraSoftGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>

    <filter id="asuraWordGlow" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#asuraPlate)" rx="14" ry="14"/>
  <rect width="1280" height="320" fill="url(#asuraBackWash)" rx="14" ry="14"/>

  <g fill="#fde68a" filter="url(#asuraSoftGlow)">
    <circle cx="520"  cy="60"  r="1.4" opacity="0.55"/>
    <circle cx="660"  cy="280" r="1.2" opacity="0.5"/>
    <circle cx="820"  cy="50"  r="1.0" opacity="0.45"/>
    <circle cx="940"  cy="270" r="1.3" opacity="0.5"/>
    <circle cx="1080" cy="80"  r="1.2" opacity="0.5"/>
    <circle cx="1180" cy="220" r="1.0" opacity="0.45"/>
    <circle cx="420"  cy="240" r="1.0" opacity="0.45"/>
    <circle cx="760"  cy="160" r="0.9" opacity="0.4"/>
    <circle cx="1220" cy="140" r="0.9" opacity="0.4"/>
  </g>

  <!-- ===== Aether sigil ===== -->
  <g transform="translate(40,40)">
    <circle cx="120" cy="120" r="115" fill="url(#asuraAura)"/>

    <g fill="none" stroke="url(#asuraGold)" stroke-linecap="round" filter="url(#asuraGlow)">
      <path d="M 204 86
               C 188 76, 168 74, 152 86
               S 130 116, 126 126"
            stroke-width="3.5" opacity="0.72"/>
      <path d="M 210 74
               C 200 66, 188 64, 176 70"
            stroke-width="1.8" opacity="0.5"/>

      <path d="M 36 154
               C 52 166, 72 168, 88 154
               S 110 124, 114 114"
            stroke-width="3.5" opacity="0.72"/>
      <path d="M 30 166
               C 40 174, 52 176, 64 170"
            stroke-width="1.8" opacity="0.5"/>

      <path d="M 184 204
               C 172 186, 164 172, 144 158
               S 124 136, 122 126"
            stroke-width="3.5" opacity="0.72"/>

      <path d="M 56 36
               C 68 54, 78 68, 96 82
               S 116 104, 118 114"
            stroke-width="3.5" opacity="0.72"/>

      <polyline points="138,42 146,58 140,66 152,78" stroke-width="1.8" opacity="0.6"/>
      <polyline points="92,196 84,182 92,174 80,162"  stroke-width="1.8" opacity="0.6"/>
    </g>

    <circle cx="120" cy="120" r="55" fill="url(#asuraCore)" filter="url(#asuraGlow)"/>
    <circle cx="120" cy="120" r="11" fill="#fffbeb" opacity="0.78" filter="url(#asuraGlow)"/>

    <g fill="#fde68a" filter="url(#asuraSoftGlow)">
      <circle cx="184" cy="56"  r="1.6" opacity="0.7"/>
      <circle cx="56"  cy="194" r="1.7" opacity="0.65"/>
      <circle cx="198" cy="146" r="1.2" opacity="0.6"/>
      <circle cx="48"  cy="86"  r="1.1" opacity="0.55"/>
      <circle cx="158" cy="32"  r="0.9" opacity="0.5"/>
      <circle cx="36"  cy="130" r="1.0" opacity="0.5"/>
      <circle cx="196" cy="188" r="1.2" opacity="0.55"/>
      <circle cx="80"  cy="40"  r="0.9" opacity="0.5"/>
    </g>

    <circle cx="120" cy="120" r="118"
            fill="none"
            stroke="url(#asuraGold)"
            stroke-width="0.7"
            opacity="0.3"/>
  </g>

  <!-- ===== Stylized ASURA wordmark (hand-drawn paths so it renders the same everywhere) =====
       Coordinate system per letter:
         x: centered at 0, glyph width ~80
         baseline y=0, cap height y=-110
       Letters placed at x = 0, 120, 240, 360, 480 inside the group. -->
  <g transform="translate(390,228)"
     stroke="url(#asuraWord)"
     fill="none"
     stroke-linecap="round"
     stroke-linejoin="round"
     filter="url(#asuraWordGlow)">

    <!-- Letter A (first) -->
    <g>
      <path d="M -42 4 L 0 -112 L 42 4" stroke-width="9"/>
      <path d="M -22 -36 L 22 -36" stroke-width="7"/>
      <path d="M -50 4 L -34 4" stroke-width="6" opacity="0.85"/>
      <path d="M 34 4 L 50 4"   stroke-width="6" opacity="0.85"/>
    </g>

    <!-- Letter S -->
    <g transform="translate(120,0)">
      <path d="M 34 -94
               C 34 -118, -34 -118, -34 -88
               C -34 -64, 34 -64, 34 -32
               C 34 -2, -34 -2, -34 -28"
            stroke-width="9"/>
      <!-- subtle accent flourishes -->
      <path d="M 34 -94 L 38 -100" stroke-width="5" opacity="0.7"/>
      <path d="M -34 -28 L -38 -22" stroke-width="5" opacity="0.7"/>
    </g>

    <!-- Letter U -->
    <g transform="translate(240,0)">
      <path d="M -32 -110
               L -32 -28
               C -32 6, 32 6, 32 -28
               L 32 -110"
            stroke-width="9"/>
      <path d="M -44 -110 L -20 -110" stroke-width="6" opacity="0.85"/>
      <path d="M 20 -110 L 44 -110"   stroke-width="6" opacity="0.85"/>
    </g>

    <!-- Letter R -->
    <g transform="translate(360,0)">
      <path d="M -32 4
               L -32 -110
               L 10 -110
               C 36 -110, 36 -54, 10 -54
               L -32 -54"
            stroke-width="9"/>
      <path d="M 0 -54 L 38 4" stroke-width="9"/>
      <path d="M -44 4 L -20 4" stroke-width="6" opacity="0.85"/>
      <path d="M 26 4 L 50 4"   stroke-width="6" opacity="0.85"/>
      <path d="M -44 -110 L -20 -110" stroke-width="6" opacity="0.85"/>
    </g>

    <!-- Letter A (second) -->
    <g transform="translate(480,0)">
      <path d="M -42 4 L 0 -112 L 42 4" stroke-width="9"/>
      <path d="M -22 -36 L 22 -36" stroke-width="7"/>
      <path d="M -50 4 L -34 4" stroke-width="6" opacity="0.85"/>
      <path d="M 34 4 L 50 4"   stroke-width="6" opacity="0.85"/>
    </g>

    <!-- Gold underline accent under the wordmark -->
    <path d="M -50 22 L 530 22" stroke-width="2.5" opacity="0.7"/>
  </g>

  <!-- Taglines (kept as text — small/secondary, system font is fine) -->
  <g transform="translate(360,260)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="0" y="0"
          font-size="20"
          font-weight="500"
          letter-spacing="0.8"
          fill="#d6c9eb">
      Self-hosted security command center for authorized testing.
    </text>
    <text x="0" y="28"
          font-size="14"
          font-weight="400"
          letter-spacing="0.4"
          fill="#9685b8">
      Orchestrates 44 scanners · evidence-first · correlates attack paths · refuses to fake a scan.
    </text>
  </g>

  <rect x="1260" y="40" width="3" height="240" rx="1.5" fill="url(#asuraGold)" opacity="0.55"/>
</svg>
