<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Asura sigil">
  <title>Asura</title>
  <desc>Draconic eye sigil ringed by runic gold marks — Asura security command center.</desc>
  <defs>
    <!-- Royal purple gradient — used for the iris and aether glow -->
    <linearGradient id="asuraPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3b1d6e"/>
      <stop offset="55%"  stop-color="#6b21a8"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Aged-to-bright gold gradient — sigil ring, horns, eye outline, wordmark accents -->
    <linearGradient id="asuraGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="55%"  stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <!-- Aether glow inside the disk -->
    <radialGradient id="asuraAether" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6b21a8" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#3b1d6e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#15082c" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft glow for the aether lightning streak + eye gleam -->
    <filter id="asuraGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== Deep purple disk — the night-sky backdrop ===== -->
  <circle cx="128" cy="128" r="120" fill="#0b0418"/>
  <circle cx="128" cy="128" r="116" fill="#15082c"/>

  <!-- Inner aether glow -->
  <circle cx="128" cy="128" r="92" fill="url(#asuraAether)" opacity="0.85"/>

  <!-- ===== Sigil ring — gold runic circle drawn as 6 broken arcs ===== -->
  <g fill="none" stroke="url(#asuraGold)" stroke-width="3" stroke-linecap="round" opacity="0.95">
    <!-- 6 arcs of 50 degrees each, separated by 10 degree gaps -->
    <path d="M 213.06 99.92 A 90 90 0 0 1 222.94 145.92"/>
    <path d="M 215.93 165.66 A 90 90 0 0 1 187.64 202.78"/>
    <path d="M 169.66 213.06 A 90 90 0 0 1 123.66 222.94"/>
    <path d="M  90.08 215.93 A 90 90 0 0 1  52.96 187.64"/>
    <path d="M  42.94 169.66 A 90 90 0 0 1  33.06 123.66"/>
    <path d="M  40.07  90.08 A 90 90 0 0 1  68.36  52.96"/>
  </g>

  <!-- Six runic gold marks set at the gaps between the arcs -->
  <g fill="url(#asuraGold)" opacity="0.95">
    <!-- 12 o'clock -->
    <polygon points="128,28 132,38 128,48 124,38"/>
    <!-- 2 o'clock -->
    <polygon points="214,76 220,80 218,88 210,86 210,80"/>
    <!-- 4 o'clock -->
    <polygon points="214,180 220,180 218,188 210,190 210,184"/>
    <!-- 6 o'clock -->
    <polygon points="128,228 132,218 128,208 124,218"/>
    <!-- 8 o'clock -->
    <polygon points="42,180 36,184 38,192 46,190 46,184"/>
    <!-- 10 o'clock -->
    <polygon points="42,76 36,80 38,88 46,86 46,80"/>
  </g>

  <!-- ===== Dragon-horn arcs framing the eye ===== -->
  <g fill="none" stroke="url(#asuraGold)" stroke-width="3" stroke-linecap="round">
    <!-- Left horn -->
    <path d="M 70 90 Q 56 70 70 50"/>
    <path d="M 80 86 Q 72 74 82 64"/>
    <!-- Right horn -->
    <path d="M 186 90 Q 200 70 186 50"/>
    <path d="M 176 86 Q 184 74 174 64"/>
  </g>

  <!-- ===== Central Asura eye ===== -->
  <!-- Gold almond outline -->
  <path d="M 60 128 Q 128 76 196 128 Q 128 180 60 128 Z"
        fill="#0b0418"
        stroke="url(#asuraGold)"
        stroke-width="4"
        stroke-linejoin="round"/>

  <!-- Purple iris -->
  <circle cx="128" cy="128" r="34" fill="url(#asuraPurple)"/>
  <circle cx="128" cy="128" r="34" fill="none" stroke="url(#asuraGold)" stroke-width="2"/>

  <!-- Vertical-slit dragon pupil -->
  <path d="M 128 96
           Q 134 112 134 128
           Q 134 144 128 160
           Q 122 144 122 128
           Q 122 112 128 96 Z"
        fill="#05010d"/>

  <!-- Gold highlight gleam on the pupil — the "alive" spark -->
  <ellipse cx="124" cy="112" rx="3" ry="5" fill="#fde68a" opacity="0.9" filter="url(#asuraGlow)"/>

  <!-- ===== Aether lightning streak in the upper-right ===== -->
  <polyline points="170,52 180,68 174,76 188,92"
            fill="none"
            stroke="url(#asuraGold)"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
            opacity="0.85"
            filter="url(#asuraGlow)"/>

  <!-- Outer hairline ring — finishes the medallion edge -->
  <circle cx="128" cy="128" r="118"
          fill="none"
          stroke="url(#asuraGold)"
          stroke-width="1"
          opacity="0.55"/>
</svg>
