<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Asura aether sigil">
  <title>Asura</title>
  <desc>Aether magic convergence — swirling gold tendrils around a luminous core.</desc>
  <defs>
    <radialGradient id="asuraPlate" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a0a36"/>
      <stop offset="65%"  stop-color="#0d041e"/>
      <stop offset="100%" stop-color="#05010d"/>
    </radialGradient>

    <radialGradient id="asuraCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fffbeb" stop-opacity="0.92"/>
      <stop offset="22%"  stop-color="#fde68a" stop-opacity="0.78"/>
      <stop offset="48%"  stop-color="#d4af37" stop-opacity="0.55"/>
      <stop offset="78%"  stop-color="#6b21a8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3b1d6e" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="asuraAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="55%"  stop-color="#6b21a8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#15082c" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="asuraGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a16207"/>
      <stop offset="50%"  stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>

    <filter id="asuraGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="asuraSoftGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="120" fill="url(#asuraPlate)"/>
  <circle cx="128" cy="128" r="105" fill="url(#asuraAura)"/>

  <g fill="none" stroke="url(#asuraGold)" stroke-linecap="round" filter="url(#asuraGlow)">
    <path d="M 218 92
             C 200 80, 178 78, 162 92
             S 138 124, 134 134"
          stroke-width="3.5" opacity="0.72"/>
    <path d="M 224 80
             C 214 72, 200 70, 188 76"
          stroke-width="1.8" opacity="0.5"/>

    <path d="M 38 164
             C 56 176, 78 178, 94 164
             S 118 132, 122 122"
          stroke-width="3.5" opacity="0.72"/>
    <path d="M 32 176
             C 42 184, 56 186, 68 180"
          stroke-width="1.8" opacity="0.5"/>

    <path d="M 196 218
             C 184 198, 174 184, 154 168
             S 132 144, 130 134"
          stroke-width="3.5" opacity="0.72"/>

    <path d="M 60 38
             C 72 58, 82 72, 102 88
             S 124 112, 126 122"
          stroke-width="3.5" opacity="0.72"/>

    <polyline points="148,46 156,62 150,70 162,82" stroke-width="1.8" opacity="0.6"/>
    <polyline points="100,210 92,196 100,188 88,176" stroke-width="1.8" opacity="0.6"/>
  </g>

  <circle cx="128" cy="128" r="58" fill="url(#asuraCore)" filter="url(#asuraGlow)"/>
  <circle cx="128" cy="128" r="12" fill="#fffbeb" opacity="0.78" filter="url(#asuraGlow)"/>

  <g fill="#fde68a" filter="url(#asuraSoftGlow)">
    <circle cx="196" cy="62"  r="1.6" opacity="0.65"/>
    <circle cx="64"  cy="206" r="1.8" opacity="0.6"/>
    <circle cx="210" cy="156" r="1.4" opacity="0.6"/>
    <circle cx="54"  cy="92"  r="1.2" opacity="0.55"/>
    <circle cx="172" cy="36"  r="1.0" opacity="0.5"/>
    <circle cx="40"  cy="138" r="1.1" opacity="0.5"/>
    <circle cx="208" cy="200" r="1.3" opacity="0.55"/>
    <circle cx="84"  cy="44"  r="0.9" opacity="0.5"/>
    <circle cx="232" cy="116" r="0.9" opacity="0.45"/>
    <circle cx="28"  cy="174" r="0.9" opacity="0.45"/>
  </g>

  <circle cx="128" cy="128" r="118"
          fill="none"
          stroke="url(#asuraGold)"
          stroke-width="0.7"
          opacity="0.3"/>
</svg>
