blocked_policy:
  - "No RATs, keyloggers, stealers, botnet tooling, credential harvesters, or persistence kits."
  - "Active and lab tools require explicit authorized scope before execution."
  - "Reference-only tools may be documented or linked, but Asura will not execute them."
  - "Exploit validation must be non-destructive by default and preserve evidence."

tools:
  - id: nmap
    name: Nmap
    pack: Recon Pack
    category: network recon
    execution: core_runner
    modes: [active, lab]
    install_status: bundled
    integration_status: runner
    license: NPSL
    official_url: https://nmap.org/
    executable: nmap
    install_hint: "Install with the platform package manager or use the backend Docker image."
    input_types: [host, cidr]
    output_formats: [xml, text]
    parser: nmap_xml
    safe_default: false
    requires_authorized_scope: true
    docker_available: true
    supported_os: [linux, macos, windows]
    commands:
      - mode: active
        command: "nmap -sV --version-light -oX - {{target}}"
      - mode: lab
        command: "nmap -sV --version-light -oX - {{target}}"
    recommended_use: "Service discovery and version detection for explicitly scoped targets."
    risk_warning: "Network probing can be noisy and should not run in passive mode."

