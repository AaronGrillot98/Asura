      - mode: active
        command: "nuclei -u {{target}} -jsonl"
      - mode: lab
        command: "nuclei -u {{target}} -jsonl"
    recommended_use: "Template-based vulnerability and misconfiguration checks with evidence-backed matches."
    risk_warning: "Template selection controls scan aggressiveness."

